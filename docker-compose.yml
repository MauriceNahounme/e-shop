version: "3.6"

services:
  frontoffice:
    build:
      context: ./frontoffice
      dockerfile: Dockerfile
    container_name: frontoffice
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backoffice
    networks:
      - ecommerce-public-network
      - ecommerce-private-network

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: backoffice
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ecommerce-private-network

  postgres_db:
    image: postgres:17-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_secrets
    secrets:
      - db_secrets
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: redis_server
    restart: always
    command: ["redis-server", "--requirepass", "$(cat /run/secrets/redis_secrets"]
    secrets:
      - redis_secrets
    networks:
      - ecommerce-private-network

volumes:
  db_data:

secrets:
  db_secrets:
    file: ./secrets/db.txt
  redis_secrets:
    file: ./secrets/redis.txt

networks:
  ecommerce-public-network:
    driver: bridge
  ecommerce-private-network:
    driver: bridge